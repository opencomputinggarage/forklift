{{- /*
The session secret signs cookies and must be stable across replicas and upgrades.
If not provided, generate one and preserve any value already stored in the Secret
so reinstalling the chart does not invalidate active sessions.
*/}}
{{- $name := include "forklift.fullname" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name }}
{{- $session := .Values.auth.sessionSecret }}
{{- if not $session }}
{{- if and $existing $existing.data (index $existing.data "session-secret") }}
{{- $session = index $existing.data "session-secret" | b64dec }}
{{- else }}
{{- $session = randAlphaNum 48 }}
{{- end }}
{{- end }}
{{- /*
Initial admin password: use the provided value, else preserve an existing
generated one, else generate a random password. Retrieve it with:
  kubectl -n <ns> get secret <name> -o jsonpath='{.data.bootstrap-admin-password}' | base64 -d
*/}}
{{- $admin := .Values.auth.bootstrap.adminPassword }}
{{- if not $admin }}
{{- if and $existing $existing.data (index $existing.data "bootstrap-admin-password") }}
{{- $admin = index $existing.data "bootstrap-admin-password" | b64dec }}
{{- else }}
{{- $admin = randAlphaNum 24 }}
{{- end }}
{{- end }}
{{- /*
Replication token: authenticates the internal leader->standby replication
endpoints. Provided value wins, else preserve the generated one, else generate.
*/}}
{{- $replication := "" }}
{{- if .Values.replication.enabled }}
{{- $replication = .Values.replication.token }}
{{- if not $replication }}
{{- if and $existing $existing.data (index $existing.data "replication-token") }}
{{- $replication = index $existing.data "replication-token" | b64dec }}
{{- else }}
{{- $replication = randAlphaNum 64 }}
{{- end }}
{{- end }}
{{- end }}
{{- $scanWorker := "" }}
{{- if .Values.artifactScanning.enabled }}
{{- $scanWorker = .Values.artifactScanning.workerToken }}
{{- if not $scanWorker }}
{{- if and $existing $existing.data (index $existing.data "artifact-scan-worker-token") }}
{{- $scanWorker = index $existing.data "artifact-scan-worker-token" | b64dec }}
{{- else }}
{{- $scanWorker = randAlphaNum 64 }}
{{- end }}
{{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "forklift.labels" . | nindent 4 }}
type: Opaque
data:
  session-secret: {{ $session | b64enc | quote }}
  bootstrap-admin-password: {{ $admin | b64enc | quote }}
  {{- if .Values.replication.enabled }}
  replication-token: {{ $replication | b64enc | quote }}
  {{- end }}
  {{- if .Values.artifactScanning.enabled }}
  artifact-scan-worker-token: {{ $scanWorker | b64enc | quote }}
  {{- if .Values.artifactScanning.tokenKey }}
  artifact-scan-token-key: {{ .Values.artifactScanning.tokenKey | b64enc | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.auth.oidc.enabled }}
  oidc-client-secret: {{ .Values.auth.oidc.clientSecret | b64enc | quote }}
  {{- end }}
  {{- /*
  S3 credentials for the bundled MinIO. Forklift reads these keys; we mirror the
  MinIO root credentials here so a single value drives both the subchart and the
  app. Skipped when an external existingSecret is supplied.
  */}}
  {{- if and .Values.minio.enabled (not .Values.storage.s3.existingSecret) }}
  access-key-id: {{ .Values.minio.rootUser | b64enc | quote }}
  secret-access-key: {{ .Values.minio.rootPassword | b64enc | quote }}
  {{- end }}
  {{- /*
  Declarative local accounts: one password per account under the key
  local-user-<name>-password. Use the provided value, else preserve a previously
  generated one, else generate a random password preserved across upgrades.
  */}}
  {{- if .Values.auth.rbac.enabled }}
  {{- range .Values.auth.rbac.accounts }}
  {{- $key := printf "local-user-%s-password" .name }}
  {{- $pw := .password }}
  {{- if not $pw }}
  {{- if and $existing $existing.data (index $existing.data $key) }}
  {{- $pw = index $existing.data $key | b64dec }}
  {{- else }}
  {{- $pw = randAlphaNum 24 }}
  {{- end }}
  {{- end }}
  {{ $key }}: {{ $pw | b64enc | quote }}
  {{- end }}
  {{- end }}
