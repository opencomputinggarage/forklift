# Default values for forklift.

# -- (int) Number of replicas. With 2+ replicas, enable ha to elect a single active writer.
replicaCount: 2
# -- (int) Number of old ReplicaSets to retain for rollback.
revisionHistoryLimit: 10

# -- (object) Deployment update strategy. Empty selects a safe default per mode:
# RollingUpdate (maxUnavailable 0, maxSurge 1) in the s3 backend — per-pod
# storage + leader election + S3 fencing make a surging rollout safe and
# zero-downtime — and Recreate for the fs backend (single shared SQLite / RWO
# volume). Set explicitly to override, e.g. {type: Recreate}.
strategy: {}

image:
  # -- (string) Container image registry host. Set empty to fold the host into
  # `repository` instead.
  registry: ghcr.io
  # -- (string) Container image repository (path under the registry).
  repository: younsl/forklift
  # -- (string) Image pull policy.
  pullPolicy: IfNotPresent
  # -- (string) Image tag. Defaults to the chart appVersion when empty.
  tag: ""

# -- (list) Image pull secrets for private registries.
imagePullSecrets: []
# -- (string) Override the chart name portion of resource names.
nameOverride: ""
# -- (string) Override the fully qualified resource name.
fullnameOverride: ""

# High availability via Kubernetes Lease leader election. Only the leader is
# Ready (the Service routes to it) and runs the blob sweeper, guaranteeing a
# single writer to the SQLite database on the shared RWX volume.
ha:
  # -- (bool) Enable leader election. Auto-derived from replicaCount > 1 when left null.
  enabled: null
  # -- (string) Lease object name. Defaults to the release fullname when empty.
  leaseName: ""
  # -- (string) Duration that non-leader candidates wait before attempting to acquire leadership.
  leaseDuration: 15s
  # -- (string) Deadline for the leader to renew the lease before giving up leadership.
  renewDeadline: 10s
  # -- (string) Interval between leadership acquisition attempts.
  retryPeriod: 2s

# PV-based replication: an alternative HA mode for clusters without
# ReadWriteMany storage (e.g. EBS-only). Renders a StatefulSet where every pod
# gets its own ReadWriteOnce PVC; the standby pulls the leader's SQLite
# snapshot and blobs every interval and promotes that copy when it wins the
# leader election. Replication is asynchronous: writes within one interval can
# be lost on failover. Traffic routes to the leader through the
# forklift.io/role=leader pod label (all pods stay Ready so rollouts proceed).
replication:
  # -- (bool) Enable PV-based replication (StatefulSet + per-pod RWO PVC). Use
  # with replicaCount 2. Mutually exclusive with the shared RWX volume mode.
  enabled: false
  # -- (string) Standby pull interval; also the bounded data-loss window on failover.
  interval: 30s
  # -- (string) Shared bearer token for the internal replication endpoints. If
  # empty a random token is generated into the chart Secret and preserved.
  token: ""

# Persistent storage for the SQLite metadata DB and the content-addressed blob
# store. For replicaCount > 1 the access mode MUST be ReadWriteMany (e.g. EFS,
# NFS, CephFS) so all replicas share the same volume. Exception: with
# replication enabled each pod gets its own ReadWriteOnce PVC (accessModes is
# ignored in that mode; storageClass, size and annotations still apply).
persistence:
  # -- (bool) Enable persistent storage. When false, data is lost on pod restart.
  enabled: true
  # -- (string) StorageClass for the PVC. Uses the cluster default when empty.
  storageClass: ""
  # -- (list) PVC access modes. MUST be ReadWriteMany for replicaCount > 1.
  accessModes:
    - ReadWriteMany
  # -- (string) PVC storage size.
  size: 20Gi
  # -- (object) Annotations to add to the PVC.
  annotations: {}
  # -- (string) Use an existing PVC instead of creating one.
  # existingClaim: ""

# Blob + metadata storage backend. "fs" (default) keeps blobs and the SQLite
# database on the PersistentVolume above. "s3" stores blobs directly in an S3
# bucket and snapshots the metadata database to S3, so an HA deployment needs no
# EBS/RWX volume: pods run as a Deployment with an emptyDir for the live SQLite
# working file, and the leader (elected via Lease when replicaCount > 1) uploads
# the metadata snapshot while standbys restore it on promotion. The s3 backend
# is mutually exclusive with replication.enabled.
storage:
  # -- (string) Storage backend: "fs" or "s3". Enabling the bundled MinIO
  # (minio.enabled=true, the default) forces the s3 backend regardless of this.
  backend: fs
  s3:
    # -- (string) S3 bucket name. Required when backend is "s3" and the bundled
    # MinIO is disabled; with MinIO enabled it defaults to the first minio.buckets entry.
    bucket: ""
    # -- (string) Key prefix within the bucket (e.g. an environment name).
    prefix: ""
    # -- (string) AWS region. Empty uses the AWS default chain / pod environment.
    region: ""
    # -- (string) Custom S3 endpoint for S3-compatible stores (e.g. external MinIO).
    # Empty uses AWS; with the bundled MinIO enabled it auto-targets the in-cluster service.
    endpoint: ""
    # -- (bool) Use path-style addressing (required by MinIO and most S3-compatibles).
    # Forced on when the bundled MinIO is enabled.
    forcePathStyle: false
    # -- (string) Leader snapshot upload / standby download cadence; the bounded
    # data-loss window on failover.
    metaSyncInterval: 30s
    # -- (string) Name of an existing Secret with keys `access-key-id` and
    # `secret-access-key` for static credentials. Leave empty to use the AWS
    # default credential chain (EKS IRSA or EKS Pod Identity) — the recommended
    # setup; grant the role s3:GetObject,PutObject,DeleteObject,ListBucket on the
    # bucket and its prefix, and annotate the serviceAccount accordingly.
    existingSecret: ""

# Bundled MinIO object storage (minio/minio subchart). Enabled by default so the
# chart provides S3-backed HA storage with no external bucket: forklift's s3
# backend is auto-wired to the in-cluster MinIO (endpoint, bucket, path-style,
# credentials). The single-node standalone default suits dev/demo; for production
# disable it (minio.enabled=false) and point storage.s3.* at AWS S3 (with EKS
# IRSA / Pod Identity) or a hardened external MinIO. These keys are passed
# straight to the subchart — see https://github.com/minio/minio/tree/master/helm/minio
# for the full set.
minio:
  # -- (bool) Deploy the bundled MinIO and wire forklift's s3 backend to it.
  enabled: true
  image:
    # -- (string) MinIO server image repository.
    repository: quay.io/minio/minio
    # -- (string) MinIO server image tag. Pinned to a recent release for full S3
    # conditional-write support (If-Match / If-None-Match), used by the metadata
    # snapshot fencing in HA.
    tag: RELEASE.2025-09-07T16-13-09Z
  # -- (string) Deployment mode: "standalone" (single node) or "distributed".
  mode: standalone
  # -- (string) MinIO root access key. Mirrored into forklift's Secret as the
  # S3 access-key-id. CHANGE for any non-dev use.
  rootUser: forklift
  # -- (string) MinIO root secret key (min 8 chars). Mirrored as the S3
  # secret-access-key. CHANGE for any non-dev use.
  rootPassword: forklift-minio-change-me
  # -- (list) Buckets to provision on install. The first entry is the bucket
  # forklift uses unless storage.s3.bucket overrides it.
  buckets:
    - name: forklift
      policy: none
      purge: false
  persistence:
    # -- (bool) Persist MinIO data on a PVC. Disable only for throwaway demos.
    enabled: true
    # -- (string) Size of the MinIO data volume.
    size: 10Gi
  resources:
    requests:
      # -- (string) MinIO memory request. The subchart default (16Gi) is sized for
      # large clusters; this lowers it for a single-node bundled deployment.
      memory: 512Mi

# Authentication and authorization.
auth:
  # -- (bool) Allow unauthenticated read (pull) access.
  anonymousRead: false
  # -- (string) Session cookie lifetime.
  sessionTTL: 12h
  # -- (string) Secret used to sign session cookies; MUST be shared across replicas.
  # If empty a value is generated into the chart Secret on first install and preserved.
  sessionSecret: ""
  bootstrap:
    # -- (string) Admin username seeded on first run (no users yet).
    adminUser: admin
    # -- (string) Admin password seeded on first run. If empty a random password is
    # generated into the chart Secret (key: bootstrap-admin-password) and preserved
    # across upgrades. Rotate after first login. Retrieve a generated password with:
    #   kubectl get secret <release>-forklift -o jsonpath='{.data.bootstrap-admin-password}' | base64 -d
    adminPassword: ""
  oidc:
    # -- (bool) Enable OIDC single sign-on.
    enabled: false
    # -- (string) OIDC issuer URL.
    issuerURL: ""
    # -- (string) OIDC client ID.
    clientID: ""
    # -- (string) OIDC client secret.
    clientSecret: ""
    # -- (string) OIDC redirect URL.
    redirectURL: ""
    # -- (string) Token claim used as the username.
    usernameClaim: preferred_username
    # -- (string) Token claim used for group membership.
    groupsClaim: groups
  # Declarative, ArgoCD-style RBAC reconciled from this chart on every startup.
  # The policy is authoritative for the roles, grants and group mappings it
  # defines (managed rows): removing an entry here removes it from the database
  # on the next restart. Roles, mappings and assignments created interactively
  # in the UI are left untouched and remain editable.
  rbac:
    # -- (bool) Enable declarative RBAC. When false, no policy is mounted and
    # authorization relies solely on roles managed through the UI/API.
    enabled: true
    # -- (string) Default role granted to every authenticated user, even with no
    # explicit role or group mapping (ArgoCD policy.default). Empty disables it
    # (deny-all until a role is granted). The default `readonly` role below grants
    # read (pull) access to all repositories for any signed-in user.
    policyDefault: readonly
    # -- (string) ArgoCD-style policy. Permission lines:
    #   p, <role>, repo, <action>, <repo-glob>, allow
    # where <action> is read|write|delete|approve|audit|admin (or '*' = admin).
    # Grant lines:
    #   g, <subject>, <role>
    # where <subject> is `group:<keycloak-group>`, `user:<username>`, or a bare
    # name (treated as a user). Lines starting with '#' are comments.
    policy: |
      # The `administrator` role (admin on every repository) is created
      # automatically for the bootstrap admin on first run, so it is not declared
      # here; reference it in grant lines below to assign full access to others.

      # readonly: read-only (pull) access to every repository. Default role for
      # all authenticated users.
      p, readonly, repo, read, *, allow

      # auditor (security engineer): read-only across all administrative surfaces
      # (audit) plus package approval decisions and repository reads, but no
      # create/update/delete.
      p, auditor, repo, audit, *, allow
      p, auditor, repo, approve, *, allow
      p, auditor, repo, read, *, allow

      # Example: developers can pull and push to team repositories.
      # p, developer, repo, read, team-a-*, allow
      # p, developer, repo, write, team-a-*, allow

      # Example: map a Keycloak group and a specific user to roles.
      # g, group:/platform-admins, administrator
      # g, user:alice, developer
    # -- (list) Local (password) accounts to provision declaratively. Each gets a
    # password generated into the chart Secret (key: local-user-<name>-password)
    # and preserved across upgrades, or set `password` explicitly. Grant roles to
    # them with `g, user:<name>, <role>` lines above. Existing accounts (incl. the
    # bootstrap admin) are never overwritten.
    accounts: []
    #  - name: ci-bot
    #    password: ""   # empty -> generated and stored in the Secret

# Per-repository audit log: records every artifact download/upload/delete and
# repository config change with user, status and client IP.
audit:
  # -- (bool) Enable the audit log.
  enabled: true
  # -- (string) Retention period; the leader prunes older entries. "0" keeps them forever.
  retention: 2160h # 90 days

# Vulnerability scanning data source (OSV). Passed to the container as CLI flags
# (--osv-url, --vuln-rescan-interval, --vuln-ttl). Enforcement is per-repository
# (Settings > Vulnerability policy) and only happens for repositories that opt
# in, so there is no global on/off here; this just points the scanner at an OSV
# endpoint. For air-gapped clusters, set this to a self-hosted/mirrored OSV.
vuln:
  # -- (string) OSV API base URL used to scan requested versions. Empty disables scanning.
  osvUrl: https://api.osv.dev
  # -- (string) How often stale scan results are re-queried.
  rescanInterval: 6h
  # -- (string) Age at which a scan result is considered stale.
  ttl: 24h

# License scanning data source (deps.dev). Passed to the container as CLI flags
# (--deps-dev-url, --license-rescan-interval, --license-ttl). Like vulnerability
# scanning, enforcement is per-repository; this only points the resolver at a
# deps.dev endpoint. Set depsDevUrl empty to disable license resolution.
license:
  # -- (string) deps.dev API base URL used to resolve package licenses. Empty disables resolution.
  depsDevUrl: https://api.deps.dev
  # -- (string) How often stale license results are re-queried.
  rescanInterval: 24h
  # -- (string) Age at which a license result is considered stale.
  ttl: 168h

# -- (string) Public base URL clients reach forklift at (e.g. https://forklift.example.com).
# When set, generated index/metadata URLs use it instead of the inbound request
# host, which hardens against Host-header injection. Empty uses the request host.
externalUrl: ""

# -- (bool) Seed default repositories on first run, like a fresh Nexus install: a
# proxy of each public registry (Maven Central, npm, crates.io, Go proxy) plus one
# local hosted repository per format. Idempotent. Set false to start with no repos.
seedDefaultRepos: true

log:
  # -- (string) Log level (debug, info, warn, error).
  level: info
  # -- (string) Log format (json, text).
  format: json

serviceAccount:
  # -- (bool) Create a ServiceAccount.
  create: true
  # -- (object) Annotations to add to the ServiceAccount (e.g. IRSA role ARN).
  annotations: {}
  # -- (string) ServiceAccount name. Generated from the fullname when empty.
  name: ""

rbac:
  # -- (bool) Create namespaced Role/RoleBinding for the Lease used by leader
  # election. Created when ha is on.
  create: true

service:
  # -- (string) Service type.
  type: ClusterIP
  # -- (int) Service port for HTTP traffic.
  port: 80
  # -- (int) Service port exposing Prometheus metrics (container port 8081).
  metricsPort: 8081
  # -- (object) Annotations to add to the Service.
  annotations: {}

ingress:
  # -- (bool) Enable Ingress.
  enabled: false
  # -- (string) IngressClass name.
  className: ""
  # -- (object) Annotations to add to the Ingress.
  annotations: {}
  # -- (list) Ingress host rules.
  hosts:
    - host: forklift.example.com
      paths:
        - path: /
          pathType: Prefix
  # -- (list) Ingress TLS configuration.
  tls: []

# Gateway API HTTPRoute (alternative to Ingress).
gateway:
  # -- (bool) Enable HTTPRoute.
  enabled: false
  # -- (string) HTTPRoute name. Defaults to the release fullname when empty.
  name: ""
  # -- (list) Parent Gateway references.
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: main-gateway
      namespace: gateway-system
      sectionName: https
  # -- (list) Hostnames for the route.
  hostnames:
    - forklift.example.com
  # -- (list) HTTP route rules.
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      # -- (list) HTTPRoute filters (RequestHeaderModifier, ResponseHeaderModifier,
      # RequestRedirect, URLRewrite, RequestMirror, ExtensionRef).
      filters: []
      # -- (list) HTTPBackendRefs. Empty `name` defaults to the chart Service and
      # empty `port` to service.port at render time.
      backendRefs:
        - group: ""
          kind: Service
          name: ""
          port: ""
          weight: 1

# -- (object) Annotations to add to pods.
podAnnotations: {}
# -- (object) Labels to add to pods.
podLabels: {}

# -- (object) Pod-level security context.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532

# -- (object) Container-level security context.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# -- (object) Container resource requests and limits.
resources:
  limits:
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 128Mi

# -- (list) In-place pod vertical scaling policy (Kubernetes 1.27+ resize). Example:
#   - resourceName: memory
#     restartPolicy: NotRequired
resizePolicy: []

# -- (object) Liveness probe configuration.
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

# -- (object) Readiness probe configuration.
readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 3
  periodSeconds: 5

podDisruptionBudget:
  # -- (bool) Create a PodDisruptionBudget to keep replicas available during disruptions.
  enabled: true
  # -- (int) Minimum number of available replicas.
  minAvailable: 1

serviceMonitor:
  # -- (bool) Create a Prometheus Operator ServiceMonitor.
  enabled: false
  # -- (string) Scrape interval.
  interval: 30s
  # -- (string) Scrape timeout. Uses the Prometheus default when empty.
  scrapeTimeout: ""
  # -- (object) Additional labels for the ServiceMonitor (e.g. release selector).
  additionalLabels: {}

# -- (object) Node selector for pod scheduling.
nodeSelector: {}
# -- (list) Tolerations for pod scheduling.
tolerations: []
# -- (object) Affinity rules for pod scheduling.
affinity: {}
# -- (list) Topology spread constraints for pod scheduling.
topologySpreadConstraints: []

# -- (list) Raw environment variables appended to the container.
extraEnv: []

# -- (list) Raw CLI flags appended to the container args (after the scan flags).
extraArgs: []

# -- (list) Arbitrary additional manifests to render (each value is templated).
extraObjects: []
