name: Release Chart

run-name: "📦 Release forklift chart to ghcr.io"

# Packages and pushes the forklift Helm chart to GHCR as an OCI artifact when
# charts/forklift/Chart.yaml changes on main. Skips if that chart version
# already exists on GHCR.
on:
  push:
    branches: [main]
    paths:
      - 'charts/forklift/Chart.yaml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  CHART_PATH: charts/forklift
  CHART_NAME: forklift

jobs:
  detect:
    runs-on: ubuntu-24.04
    permissions:
      packages: read
    outputs:
      should_release: ${{ steps.gen.outputs.should_release }}
      version: ${{ steps.gen.outputs.version }}
      app_version: ${{ steps.gen.outputs.app_version }}
      registry_path: ${{ steps.gen.outputs.registry_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve version and check GHCR
        id: gen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          owner="${{ github.repository_owner }}"
          registry_path="${REGISTRY}/${owner,,}/charts"

          version=$(grep '^version:' "${CHART_PATH}/Chart.yaml" | awk '{print $2}' | tr -d '"')
          app_version=$(grep '^appVersion:' "${CHART_PATH}/Chart.yaml" | awk '{print $2}' | tr -d '"')

          token=$(echo -n "${GH_TOKEN}" | base64)
          tags=$(curl -sf -H "Authorization: Bearer ${token}" \
            "https://${REGISTRY}/v2/${owner,,}/charts/${CHART_NAME}/tags/list" 2>/dev/null || echo '{"tags":[]}')

          if echo "${tags}" | jq -e --arg v "${version}" '.tags // [] | index($v)' > /dev/null 2>&1; then
            echo "✅ ${CHART_NAME}:${version} already exists on GHCR — skip"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "🆕 ${CHART_NAME}:${version} not found on GHCR — will release"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "app_version=${app_version:-N/A}" >> "$GITHUB_OUTPUT"
          echo "registry_path=${registry_path}" >> "$GITHUB_OUTPUT"

  release:
    needs: detect
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    env:
      CHART_VERSION: ${{ needs.detect.outputs.version }}
      APP_VERSION: ${{ needs.detect.outputs.app_version }}
      REGISTRY_PATH: ${{ needs.detect.outputs.registry_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.19.0

      - name: Lint chart
        run: helm lint "${CHART_PATH}"

      - name: Install helm-docs
        env:
          HELM_DOCS_VERSION: "1.14.2"
        run: |
          curl -sSL "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_x86_64.tar.gz" \
            | tar xz -C /usr/local/bin helm-docs

      - name: Validate helm-docs
        run: |
          if [ -f "${CHART_PATH}/README.md.gotmpl" ]; then
            helm-docs --chart-search-root "${CHART_PATH}" --template-files="README.md.gotmpl" --sort-values-order file --log-level info
          else
            echo "No helm-docs template found, skipping validation"
            exit 0
          fi

          if ! git diff --exit-code -- "${CHART_PATH}/README.md"; then
            echo "::error::helm-docs validation failed: ${CHART_PATH}/README.md is out of date. Run 'helm-docs' locally and commit the changes."
            exit 1
          fi

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "${REGISTRY}" --username "${{ github.actor }}" --password-stdin

      - name: Package and push chart
        run: |
          helm package "${CHART_PATH}" --version "${CHART_VERSION}"
          helm push "${CHART_NAME}-${CHART_VERSION}.tgz" "oci://${REGISTRY_PATH}"

      - name: Summary
        if: always()
        run: |
          OCI_REF="oci://${REGISTRY_PATH}/${CHART_NAME}"
          {
            echo "## ${CHART_NAME}"
            echo ""
            echo "| Key | Value |"
            echo "|-----|-------|"
            echo "| Version | \`${CHART_VERSION}\` |"
            echo "| App Version | \`${APP_VERSION}\` |"
            echo "| OCI | \`${OCI_REF}\` |"
            echo ""
            echo "\`\`\`bash"
            echo "helm install ${CHART_NAME} ${OCI_REF} --version ${CHART_VERSION}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
