{{- include "forklift.validateStorage" . }}
{{- if not .Values.replication.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "forklift.fullname" . }}
  labels:
    {{- include "forklift.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  {{- if .Values.strategy }}
  strategy:
    {{- toYaml .Values.strategy | nindent 4 }}
  {{- else if eq (include "forklift.s3Enabled" .) "true" }}
  # s3 mode: each pod has its own SQLite working file (emptyDir) and a single
  # writer is guaranteed by leader election plus S3 metadata fencing, so a
  # surging rollout is safe — RollingUpdate avoids the Recreate downtime.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  {{- else }}
  # Shared RWX volume (or single instance on an RWO PVC) holds one SQLite DB;
  # surging would let two pods write the same file (or contend for the volume),
  # so recreate rather than surge to keep a single writer.
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "forklift.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- if .Values.auth.rbac.enabled }}
        checksum/rbac-policy: {{ .Values.auth.rbac.policy | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "forklift.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "forklift.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: forklift
          image: "{{ include "forklift.image" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 8081
          args:
            {{- include "forklift.args" . | nindent 12 }}
          env:
            {{- include "forklift.env" . | nindent 12 }}
          {{- with .Values.resizePolicy }}
          resizePolicy:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            {{- include "forklift.rbacVolumeMounts" . | nindent 12 }}
      volumes:
        - name: data
          {{- if and .Values.persistence.enabled (ne (include "forklift.s3Enabled" .) "true") }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (include "forklift.fullname" .) }}
          {{- else }}
          # s3 backend: only the live SQLite working file lives here; blobs and
          # the durable metadata snapshot are in S3, so an ephemeral volume is
          # sufficient and no EBS/RWX PersistentVolume is required.
          emptyDir: {}
          {{- end }}
        {{- include "forklift.rbacVolumes" . | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
