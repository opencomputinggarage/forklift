{{- if and .Values.artifactScanning.enabled .Values.artifactScanning.worker.enabled (eq .Values.artifactScanning.worker.mode "deployment") }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "forklift.fullname" . }}-scanner
  labels:
    {{- include "forklift.labels" . | nindent 4 }}
    app.kubernetes.io/component: scanner
spec:
  replicas: {{ .Values.artifactScanning.worker.replicas }}
  selector:
    matchLabels:
      {{- include "forklift.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: scanner
  template:
    metadata:
      labels:
        {{- include "forklift.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: scanner
    spec:
      automountServiceAccountToken: false
      {{- with .Values.artifactScanning.worker.runtimeClassName }}
      runtimeClassName: {{ . | quote }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: scanner
          image: "{{ include "forklift.scannerImage" . }}"
          imagePullPolicy: {{ .Values.artifactScanning.worker.image.pullPolicy }}
          args:
            - --server=http://{{ include "forklift.fullname" . }}:{{ .Values.service.port }}
            - --worker-id=$(POD_NAME)
            - --worker-token=$(FORKLIFT_ARTIFACT_SCAN_WORKER_TOKEN)
            - --work-dir=/work
            - --max-artifact-bytes={{ .Values.artifactScanning.worker.maxArtifactBytes }}
            {{- if .Values.artifactScanning.worker.once }}
            - --once
            {{- end }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: FORKLIFT_ARTIFACT_SCAN_WORKER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "forklift.fullname" . }}
                  key: artifact-scan-worker-token
            - name: GRYPE_DB_AUTO_UPDATE
              value: "false"
            - name: GRYPE_CHECK_FOR_APP_UPDATE
              value: "false"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            {{- toYaml .Values.artifactScanning.worker.resources | nindent 12 }}
          volumeMounts:
            - name: work
              mountPath: /work
      volumes:
        - name: work
          emptyDir:
            sizeLimit: {{ .Values.artifactScanning.worker.workspace.sizeLimit | quote }}
{{- end }}
