name: Clean Workflow Runs

run-name: "🧹 Clean workflow runs (keep latest ${{ inputs.keep || 5 }} repo-wide)"

# Prunes GitHub Actions run history, keeping only the most recent N completed
# runs across ALL workflows combined (default 5) and deleting the rest. Runs
# weekly and on demand. Only completed runs are eligible, so queued/in-progress
# runs are never touched.
on:
  schedule:
    - cron: "0 3 * * 0" # Sundays 03:00 UTC
  workflow_dispatch:
    inputs:
      keep:
        description: "Number of recent runs to keep repo-wide (all workflows combined)"
        type: number
        default: 5

# Deleting runs requires actions: write.
permissions:
  actions: write
  contents: read

concurrency:
  group: clean-workflow-runs
  cancel-in-progress: false

jobs:
  clean:
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      KEEP: ${{ inputs.keep || 5 }}
    steps:
      - name: Delete old runs, keeping the latest ${{ inputs.keep || 5 }} repo-wide
        run: |
          set -euo pipefail
          keep="${KEEP}"
          echo "Keeping the latest ${keep} completed run(s) across all workflows in ${REPO}."

          # Collect every completed run repo-wide as "<created_at> <id>" lines.
          # Per-page --jq is page-local, so we re-sort newest-first afterwards,
          # then skip the newest ${keep} and delete the remainder.
          runs=$(gh api --paginate \
            "repos/${REPO}/actions/runs?status=completed&per_page=100" \
            --jq '.workflow_runs[] | "\(.created_at) \(.id)"')

          to_delete=$(printf '%s\n' "${runs}" | sed '/^$/d' | sort -r | tail -n +"$((keep + 1))" | awk '{print $2}')
          n=$(printf '%s\n' "${to_delete}" | sed '/^$/d' | wc -l | tr -d ' ')
          echo "Deleting ${n} old run(s)."

          total=0
          for id in ${to_delete}; do
            if gh api -X DELETE "repos/${REPO}/actions/runs/${id}" >/dev/null 2>&1; then
              total=$((total + 1))
            else
              echo "  warn: could not delete run ${id}"
            fi
          done

          echo "Done. Deleted ${total} run(s) in total."
