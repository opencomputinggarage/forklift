name: Release Container

run-name: "📦 Release forklift container (version label change)"

# Builds and pushes the forklift image to GHCR when the
# org.opencontainers.image.version label in the Dockerfile changes on main.
# Skips the build if that version tag already exists on GHCR.
on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
  workflow_dispatch:

env:
  GO_VERSION: "1.26.4"
  NODE_VERSION: "24"
  PNPM_VERSION: "11.8.0"
  COVERAGE_MIN: "70"
  REGISTRY: ghcr.io

jobs:
  # ---------------------------------------------------------------------------
  # Detect: read the version label from the Dockerfile and check GHCR so we
  # don't rebuild a version that already exists.
  # ---------------------------------------------------------------------------
  detect:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    outputs:
      should_release: ${{ steps.gen.outputs.should_release }}
      version: ${{ steps.gen.outputs.version }}
      image: ${{ steps.gen.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve version and check GHCR
        id: gen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          image="${{ github.repository_owner }}/forklift"
          image="${image,,}"  # GHCR requires lowercase

          version=$(grep -oP 'org\.opencontainers\.image\.version="\K[^"]+' Dockerfile || echo "")
          if [[ -z "${version}" ]]; then
            echo "::error::org.opencontainers.image.version not found in Dockerfile"
            exit 1
          fi

          token=$(echo -n "${GH_TOKEN}" | base64)
          tags=$(curl -sf -H "Authorization: Bearer ${token}" \
            "https://${REGISTRY}/v2/${image}/tags/list" 2>/dev/null || echo '{"tags":[]}')

          if echo "${tags}" | jq -e --arg v "${version}" '.tags // [] | index($v)' > /dev/null 2>&1; then
            echo "✅ ${image}:${version} already exists on GHCR — skip"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "🆕 ${image}:${version} not found on GHCR — will release"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Test: gofmt check, go vet, race tests, coverage gate (70% minimum).
  # ---------------------------------------------------------------------------
  test:
    needs: detect
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Build web UI
        run: |
          pnpm --dir web install --frozen-lockfile
          pnpm --dir web run build

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt needed for:"; echo "$unformatted"; exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test with race detector and coverage
        run: |
          go test -race -coverprofile=cover.out ./...
          total=$(go tool cover -func=cover.out | awk '/^total:/ {gsub("%","",$3); print $3}')
          echo "total coverage: ${total}% (min ${COVERAGE_MIN}%)"
          awk "BEGIN { exit !(${total} >= ${COVERAGE_MIN}) }" || { echo "::error::coverage below ${COVERAGE_MIN}%"; exit 1; }

  # ---------------------------------------------------------------------------
  # Build & push the multiarch scratch image. Cross-compilation happens inside
  # the builder stage (CGO disabled), so buildx needs no QEMU for the compile.
  # ---------------------------------------------------------------------------
  build-docker:
    needs: [detect, test]
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ${{ needs.detect.outputs.image }}
      VERSION: ${{ needs.detect.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.VERSION }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
